<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>撲克牌讀心術</title>
<!-- 宣告 PWA 的 manifest -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Mind Reader">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
  /* 維持極簡觸控風格 */
  body {
    margin: 0; padding: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background-color: #1a1a1a; color: #fff;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden; touch-action: none; 
  }
  #app-container {
    text-align: center; width: 100%; max-width: 600px; 
    padding: 0; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; height: 100%; 
  }
  
  /* 說明畫面設計 */
  #intro-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; z-index: 10;
    padding: 15px; box-sizing: border-box;
  }
  .intro-text {
    text-align: left; font-size: clamp(1em, 4vw, 1.2em); line-height: 1.8;
    max-width: 450px; margin-bottom: 30px; background: rgba(255, 255, 255, 0.1);
    padding: 20px; border-radius: 12px; box-sizing: border-box; width: 90%;
  }
  .start-btn {
    padding: 15px 50px; font-size: 1.5em; font-weight: bold; border-radius: 10px;
    background-color: #f39c12; color: white; border: none; cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.1s; position: relative; z-index: 20;
  }
  .start-btn:active { transform: scale(0.95); }

  /* 照片操作區 */
  #card-area {
    display: none; flex-direction: column; height: 100%; width: 100%; justify-content: center; align-items: center;
    position: relative;
  }
  
  #current-photo {
    width: 90%; max-width: 500px; max-height: 80vh; object-fit: contain; 
    border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    transition: transform 0.3s ease-out, opacity 0.3s ease-out;
    z-index: 2; 
  }

  /* ★ 修復版：Tinder 滑動飛出動畫效果 (加入 !important 強制執行) ★ */
  .swipe-left { transform: translateX(-100vw) rotate(-15deg) !important; opacity: 0 !important; }
  .swipe-right { transform: translateX(100vw) rotate(15deg) !important; opacity: 0 !important; }
  .swipe-up { transform: translateY(-100vh) rotate(5deg) !important; opacity: 0 !important; }
  
  .reset-pos { transform: scale(0.9); opacity: 0; transition: none !important; }
  .show-pos { transform: scale(1) !important; opacity: 1 !important; transition: transform 0.3s ease-out, opacity 0.3s ease-out !important; }

  /* ========================================= */
  /* ★ 全螢幕三區塊漸層箭頭提示 ★ */
  /* ========================================= */
  #swipe-overlay-zones {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; /* 穿透觸控，不影響滑動 */
    z-index: 5; /* 覆蓋在照片上方 */
  }

  .zone-block {
    position: absolute; display: flex; box-sizing: border-box;
  }

  /* 頂部區塊 (花色不對) */
  .zone-up {
    top: 0; left: 0; width: 100%; height: 25%;
    background: linear-gradient(to bottom, rgba(52, 152, 219, 0.08), transparent);
    flex-direction: column; align-items: center; justify-content: flex-start;
    padding-top: 3%;
  }
  .zone-up .arrow { color: rgba(52, 152, 219, 0.4); font-size: 3.5em; line-height: 0.8; margin-bottom: 5px; }
  .zone-up .text { color: rgba(52, 152, 219, 0.4); font-size: 1.1em; font-weight: bold; letter-spacing: 3px; }

  /* 左側區塊 (沒出現) */
  .zone-left {
    bottom: 0; left: 0; width: 30%; height: 75%;
    background: linear-gradient(to right, rgba(231, 76, 60, 0.08), transparent);
    flex-direction: column; align-items: flex-start; justify-content: center;
    padding-left: 4%;
  }
  .zone-left .arrow { color: rgba(231, 76, 60, 0.4); font-size: 3.5em; line-height: 0.8; margin-bottom: 15px; }
  .zone-left .text { color: rgba(231, 76, 60, 0.4); font-size: 1.2em; font-weight: bold; writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 5px; }

  /* 右側區塊 (完全一樣) */
  .zone-right {
    bottom: 0; right: 0; width: 30%; height: 75%;
    background: linear-gradient(to left, rgba(46, 204, 113, 0.08), transparent);
    flex-direction: column; align-items: flex-end; justify-content: center;
    padding-right: 4%;
  }
  .zone-right .arrow { color: rgba(46, 204, 113, 0.4); font-size: 3.5em; line-height: 0.8; margin-bottom: 15px; }
  .zone-right .text { color: rgba(46, 204, 113, 0.4); font-size: 1.2em; font-weight: bold; writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 5px; }

  /* 結果呈現區 */
  #result {
    display: none; font-size: clamp(1.2em, 5vw, 1.8em); line-height: 1.6;
    padding: 10px; width: 100%; box-sizing: border-box; text-align: center; z-index: 10;
  }
  .prob-text {
    font-size: clamp(1.8em, 9vw, 3em); font-weight: bold; color: #f1c40f;
    letter-spacing: 2px; margin-top: 15px; display: block; word-break: break-all; 
  }
</style>
</head>
<body>

  <div id="app-container">
    
    <!-- 魔術說明頁面 -->
    <div id="intro-screen">
      <h1 style="color: #f1c40f; margin-bottom: 20px; font-size: clamp(1.8em, 6vw, 2.5em);">讀心術說明</h1>
      <div class="intro-text">
        <p>請在心中默想一張撲克牌。</p>
        <p style="color:#f39c12; font-weight:bold;">過程中你可以故意說謊一次！</p>
        <p>接下來畫面上會依序出現照片，請直接在畫面上<strong style="color:#f1c40f;">「滑動照片」</strong>來回答：</p>
        <ul style="list-style-type: none; padding: 0;">
          <li style="margin-bottom: 15px;">
            <strong style="color:#2ecc71; font-size:1.1em;">👉 向右滑動</strong><br>代表數字與花色「完全一樣」
          </li>
          <li style="margin-bottom: 15px;">
            <strong style="color:#3498db; font-size:1.1em;">👆 向上滑動</strong><br>代表有<strong style="color:#3498db; font-size:1.1em;">數字</strong>，但「花色不對」
          </li>
          <li style="margin-bottom: 15px;">
            <strong style="color:#e74c3c; font-size:1.1em;">👈 向左滑動</strong><br>代表完全沒有出現你想的數字
          </li>
        </ul>
      </div>
      <button class="start-btn" onclick="startMagic()">準備好了，開始</button>
    </div>

    <!-- 照片操作區 (滑動區) -->
    <div id="card-area">
      <img id="current-photo" src="photo1.png" onerror="this.src='https://placehold.co/500x700/333333/ffffff?text=Photo+1'">
      
      <!-- 全螢幕三區塊漸層提示 -->
      <div id="swipe-overlay-zones">
        <div class="zone-block zone-up">
          <div class="arrow">⇧</div>
          <div class="text">花色不對</div>
        </div>
        <div class="zone-block zone-left">
          <div class="arrow">⇦</div>
          <div class="text">沒出現</div>
        </div>
        <div class="zone-block zone-right">
          <div class="arrow">⇨</div>
          <div class="text">完全一樣</div>
        </div>
      </div>
    </div>

    <!-- 最終結果展示區 -->
    <div id="result"></div>
  </div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => {
      console.log("Service Worker 註冊成功");
    });
  }

  let currentCard = 1;
  const answers = {};
  const photoImg = document.getElementById('current-photo');
  const cardArea = document.getElementById('card-area');
  const resultArea = document.getElementById('result');
  const introScreen = document.getElementById('intro-screen');

  const photosData = {
    1:['2S', '3D', '8S', '9C', '4D', '5C'],
    2:['3S', '6H', '7S', 'JS', '2H', '10D'],
    3:['4S', '5H', 'KD', 'QH', '6S', '7D'],
    4:['10C', '8D', 'QC', 'KC', '9D', 'JD'],
    5:['AD', '2D', '5S', 'JH', 'QD', '6C', '8C'],
    6:['3H', 'AH', '6D', '4C', 'KH', '10S', '8D'],
    7:['5D', 'AS', 'KS', '3C', '9H', '7H', 'JC']
  };
  const missingCards =['2C', 'AC', 'QS', '9S', '4H', '10H', '7C'];

  function preloadImages() {
    for (let i = 1; i <= 7; i++) {
      const img = new Image();
      img.src = `photo${i}.png`; 
    }
  }
  preloadImages();

  function startMagic() {
    if (Notification.permission !== "granted") {
      Notification.requestPermission();
    }
    introScreen.style.display = 'none';
    cardArea.style.display = 'flex';
  }

  // =========================================
  // ★ Tinder 滑動手勢偵測引擎 ★
  // =========================================
  let touchStartX = 0;
  let touchStartY = 0;
  let touchEndX = 0;
  let touchEndY = 0;

  cardArea.addEventListener('touchstart', function(event) {
    touchStartX = event.changedTouches[0].screenX;
    touchStartY = event.changedTouches[0].screenY;
  }, {passive: false});

  cardArea.addEventListener('touchmove', function(event) {
    event.preventDefault(); 
  }, {passive: false});

  cardArea.addEventListener('touchend', function(event) {
    touchEndX = event.changedTouches[0].screenX;
    touchEndY = event.changedTouches[0].screenY;
    handleSwipe();
  });

  function handleSwipe() {
    let deltaX = touchEndX - touchStartX;
    let deltaY = touchEndY - touchStartY;
    let absX = Math.abs(deltaX);
    let absY = Math.abs(deltaY);
    
    let threshold = 50; 

    if (absX < threshold && absY < threshold) return; 

    if (absX > absY) {
      if (deltaX > 0) {
        processAnswer('Y', 'swipe-right'); 
      } else {
        processAnswer('N', 'swipe-left');  
      }
    } else {
      if (deltaY < 0) {
        processAnswer('?', 'swipe-up');    
      }
    }
  }

  function processAnswer(btnType, animClass) {
    if (photoImg.classList.contains('swipe-left') || photoImg.classList.contains('swipe-right') || photoImg.classList.contains('swipe-up')) return;

    answers[currentCard] = btnType;
    
    // ★ 關鍵修復：先移除進入畫面的狀態，避免 CSS 互相抵觸
    photoImg.classList.remove('show-pos');
    // 加入對應方向的飛出動畫
    photoImg.classList.add(animClass); 

    setTimeout(() => {
      currentCard++;
      if (currentCard <= 7) {
        photoImg.classList.remove(animClass);
        photoImg.classList.add('reset-pos');
        
        photoImg.src = `photo${currentCard}.png`; 
        photoImg.onload = () => { 
          photoImg.classList.remove('reset-pos');
          photoImg.classList.add('show-pos');
        };
      } else {
        cardArea.style.display = 'none';
        calculateResult();
      }
    }, 300); 
  }

  // =========================================
  // ★ 核心邏輯引擎 ★
  // =========================================

  function getRank(cardStr) {
    let r = cardStr.slice(0, -1);
    if (r === 'A') return 1; if (r === 'J') return 11;
    if (r === 'Q') return 12; if (r === 'K') return 13;
    return parseInt(r);
  }

  function getSuit(cardStr) { return cardStr.slice(-1); }

  function suitToNum(suit) {
    if (suit === 'C') return 1; if (suit === 'H') return 2;
    if (suit === 'S') return 3; if (suit === 'D') return 4; return 1; 
  }

  function calculateResult() {
    let b =[];
    for(let i = 1; i <= 7; i++) b[i] = (answers[i] === 'Y' || answers[i] === '?');

    let e1 = (b[1] + b[2] + b[3] + b[4]) % 2 !== 0;
    let e2 = (b[5] + b[2] + b[4] + b[7]) % 2 !== 0;
    let e3 = (b[6] + b[3] + b[4] + b[7]) % 2 !== 0;
    
    let lie = 0;
    if (e1 && !e2 && !e3) lie = 1; else if (e1 && e2 && !e3) lie = 2;
    else if (e1 && !e2 && e3) lie = 3; else if (e1 && e2 && e3) lie = 4;
    else if (!e1 && e2 && !e3) lie = 5; else if (!e1 && !e2 && e3) lie = 6;
    else if (!e1 && e2 && e3) lie = 7;

    if (lie > 0) b[lie] = !b[lie];
    let rank = (b[7] ? 1 : 0) + (b[2] ? 2 : 0) + (b[3] ? 4 : 0) + (b[4] ? 8 : 0);

    let finalSuitNum = 1; let found = false;

    for (let i = 1; i <= 7; i++) {
      if (answers[i] === 'Y') {
        if (i === lie) continue; 
        let card = photosData[i].find(c => getRank(c) === rank);
        if (card) { finalSuitNum = suitToNum(getSuit(card)); found = true; break; }
      }
    }
    if (!found && lie > 0) {
      let card = photosData[lie].find(c => getRank(c) === rank);
      if (card) { finalSuitNum = suitToNum(getSuit(card)); found = true; }
    }
    if (!found) {
      let missingCard = missingCards.find(c => getRank(c) === rank);
      if (missingCard) { finalSuitNum = suitToNum(getSuit(missingCard)); found = true; }
    }

    let rankStr = rank.toString().padStart(2, '0');
    let d1 = Math.floor(Math.random() * 10);
    let d2 = Math.floor(Math.random() * 10);
    let prob = `${finalSuitNum}.${lie}${rankStr}${d1}${d2}%`;

    resultArea.innerHTML = `<p style="color:#bdc3c7;">請觀眾讓手機上鎖 通知讀心者...</p>`;
    resultArea.style.display = 'block';

    setTimeout(() => {
      sendToWatch(prob);
      resultArea.innerHTML = `猜中觀眾牌可能機率：<span class="prob-text">${prob}</span>`;
    }, 5000);
  }

  function sendToWatch(resultText) {
    if (Notification.permission === "granted") {
      navigator.serviceWorker.ready.then(function(registration) {
        registration.showNotification('iCloud 備份與同步', {
          body: `系統數據已更新: ${resultText}`,
          icon: 'icon.png',
          vibrate:[200, 100, 200],
          silent: false 
        });
      });
    }
  }
</script>

</body>
</html>
